<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tài Liệu Sản Xuất</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Thiết lập màu sắc và font chữ chung */
        :root {
            --bg-body: #ebf0f7;
            --bg-card: #ffffff;
            --primary-blue: #0d6efd;
            --primary-blue-dark: #0056b3;
            --text-main: #292929;
            --text-muted: #6c757d;
            --border-color: #e0e5ec;

            --color-pdf: #dc3545;
            --color-word: #0d6efd;
            --color-excel: #198754;
            --status-ok-bg: #d1e7dd;
            --status-ok-text: #0f5132;
            --status-pending-bg: #fff3cd;
            --status-pending-text: #854000;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        /* HEADER DASHBOARD CHUYÊN NGHIỆP */
        .app-header {
            background-color: var(--bg-card);
            border-radius: 5px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            padding: 16px 24px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 6px solid var(--primary-blue);
            /* Điểm nhấn màu sắc */
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-logo {
            width: 48px;
            height: 48px;
            object-fit: contain;
            padding: 4px;
        }

        .header-title h1 {
            margin: 0;
            font-size: 22px;
            color: #214497;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .header-title span {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
            display: block;
            margin-top: 4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        /* Ô tìm kiếm */
        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .search-box input {
            padding: 10px 16px 10px 38px;
            border: 1px solid var(--border-color);
            border-radius: 30px;
            outline: none;
            background-color: var(--bg-body);
            font-size: 13px;
            width: 220px;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--primary-blue);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
            width: 260px;
            /* Mở rộng khi click */
        }

        /* Hồ sơ người dùng */
        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            padding-left: 24px;
            border-left: 1px solid var(--border-color);
        }

        .user-profile img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-color);
        }

        .user-profile .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-profile .user-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-main);
        }

        .user-profile .user-role {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Card chứa bảng */
        .table-container {
            background-color: var(--bg-card);
            border-radius: 5px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            overflow-x: auto;
        }

        /* Thiết kế Bảng */
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
            white-space: nowrap;
        }

        thead th {
            background-color: var(--primary-blue);
            color: #ffffff;
            padding: 18px 12px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }

        thead th:first-child {
            border-top-left-radius: 5px;
        }

        thead th:last-child {
            border-top-right-radius: 5px;
            border-right: none;
        }

        tbody td {
            padding: 14px 7px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
            font-size: 14px;
        }

        tbody tr:hover {
            background-color: #f8faff;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Các thành phần trong bảng */
        .style-code {
            font-size: 16px;
            font-weight: bold;
            color: #214497;
        }

        .product-img {
            width: 120px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .product-img:hover {
            transform: scale(1.2);
            z-index: 10;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        /* Nút tài liệu chung */
        .doc-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.2s;
        }

        /* Giao diện nút file chung chung (màu xám nhạt, chữ đậm) */
        .btn-file {
            background-color: #f1f3f5;
            color: #495057;
            border: 1px solid #ced4da;
        }

        .btn-file:hover {
            background-color: #e2e6ea;
            color: var(--primary-blue);
            /* Đổi màu chữ sang xanh khi đưa chuột vào */
            border-color: #adb5bd;
            transform: translateY(-1px);
        }

        /* Cột hành động đa dạng */
        .action-group {
            display: flex;
            gap: 6px;
            justify-content: center;
        }
    </style>
</head>

<body>

    <header class="app-header">
        <div class="header-left">
            <img src="img/logoht.png" alt="Logo" class="header-logo" onerror="">
            <div class="header-title">
                <h1>QUẢN LÝ TÀI LIỆU SẢN XUẤT</h1>
            </div>
        </div>

        <div class="header-right">
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" placeholder="Tìm kiếm mã hàng...">
            </div>
        </div>
    </header>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>STT</th>
                    <th>Mã hàng</th>
                    <th>Hình ảnh</th>
                    <th>Tài liệu sản xuất</th>
                    <th>Góp ý mẫu</th>
                    <th>Technical file</th>
                    <th>Techpack feedback</th>
                    <th>Quy trình</th>
                    <th>Bảng chỉ</th>
                    <th>Đóng gói</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td class="style-code">365679-AW26</td>
                    <td>
                        <img src="img/365679-AW26.jpg" alt="Hình ảnh sản phẩm" class="product-img">
                    </td>
                    <td>
                        <a href="https://docs.google.com/document/d/17cLKbXwproPJ0Sv4diGGZDA9KdN_sETb/edit"
                            class="doc-btn btn-file"><i class="fa-solid fa-paperclip"></i> TLSX_365679</a>
                    </td>
                    <td>
                        <a href="https://docs.google.com/spreadsheets/d/1Gc268l2aeddZ5tJknI4FeKx6xIr82amH/edit?gid=706372959#gid=706372959"
                            class="doc-btn btn-file"><i class="fa-solid fa-paperclip"></i> Góp ý</a>
                    </td>
                    <td>
                        <a href="https://drive.google.com/file/d/1GIbI9wjPYOX0gREMzipUDeHBqalP7_Cy/view"
                            class="doc-btn btn-file"><i class="fa-solid fa-paperclip"></i> Tech file</a>
                    </td>
                    <td>
                        <div class="action-group">
                            <a href="https://docs.google.com/spreadsheets/d/1pMiSWLKjyJzQVlw9dVCSUKGfzNbtmzl2/edit?gid=152087337#gid=152087337"
                                class="doc-btn btn-file"><i class="fa-solid fa-paperclip"></i> Feedback</a>
                        </div>
                    </td>
                    <td>
                        <a href="https://docs.google.com/spreadsheets/d/1QlAHOSA4KqCh0njxgVChr4VUc12l-fBK/edit?gid=1020701676#gid=1020701676"
                            class="doc-btn btn-file"><i class="fa-solid fa-paperclip"></i> Quy trình</a>
                    </td>
                    <td>
                        <a href="https://docs.google.com/spreadsheets/d/1133i63-WZz04w7EiruF_AOTZ_eq6INJP/edit?gid=67951797#gid=67951797"
                            class="doc-btn btn-file"><i class="fa-solid fa-paperclip"></i> Bảng chỉ</a>
                    </td>
                    <td>
                        <a href="https://drive.google.com/file/d/1eLLXBE9ds_g6irgZ4CMgUtSJyvIsvfHV/view"
                            class="doc-btn btn-file"><i class="fa-solid fa-paperclip"></i> Đóng gói</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>

</html>
